services:
    forwardemail:
        restart: always
        image: forwardemail/forwardemail
        ports:
            # web
            - "3000:3000"
            # api
            - "4000:4000"
            # caldav
            - "5000:5000"
            # carddav
            - "6000:6000"
            # smtp
            - "2432:2432"
            - "2465:2465"
            - "2587:2587"
            # imap
            - "2993:2993"
            # pop3
            - "2995:2995"
            # mx
            #- "25:25"
        depends_on:
            - redis
            - mongo
        security_opt:
            - no-new-privileges:true
        read_only: true
        tmpfs:
            - /tmp
        environment:
            CMD_ARGS:
                --dbs.mongo=mongodb://mongo:27017/forwardemail
                --dbs.redis=redis://redis:6379/
    redis:
        image: redis:7-alpine
        restart: always
        security_opt:
            - no-new-privileges:true
        read_only: true
        volumes:
            - /data
    mongo:
        image: mongo:8
        restart: always
        security_opt:
            - no-new-privileges:true
        volumes:
            - /data/db
