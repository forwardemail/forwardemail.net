---
- name: Import security playbook
  import_playbook: security.yml
- name: Import Node.js playbook
  import_playbook: node.yml
- name: Import SSH keys playbook
  import_playbook: ssh-keys.yml
- name: Import UFW allowlist playbook for SQLite
  import_playbook: ufw-allowlist.yml
  vars:
    target_hosts: sqlite
    service_name: SQLite
    service_port_var: SQLITE_PORT_RANGE
    service_port_default: "3456:3460"
    service_identifier: sqlite
    ufw_comment: "Auto-whitelist SQLite"
    # Also keep the single SQLITE_PORT (legacy single-port build) permanently
    # allowlisted so a rollback to the non-range build needs no UFW redeploy.
    # This rule uses a distinct comment so the orphaned-rule cleanup (which only
    # matches `ufw_comment`) never removes it.
    service_extra_port_var: SQLITE_PORT
    service_extra_port_default: "3456"
    ufw_extra_comment: "Auto-whitelist SQLite (legacy single-port)"

- name: Import high-traffic sysctl tuning for SQLite
  import_playbook: sysctl-high-traffic.yml
  vars:
    target_hosts: sqlite
    service_name: SQLite
    sysctl_file_name: sqlite

- name: Import I/O and filesystem tuning for SQLite
  import_playbook: io-filesystem-tuning.yml
  vars:
    target_hosts: sqlite
    service_name: SQLite
    service_identifier: sqlite
    data_directory: /home/deploy/sqlite
    read_ahead_kb: 16


- hosts: sqlite
  name: Hostname
  become: true
  become_user: root
  tasks:
    - name: Set hostname
      hostname:
        name: "{{ lookup('env', 'SQLITE_HOST') }}"

- hosts: sqlite
  name: SQLITE
  become: true
  become_user: root
  # this was already defined in the ufw role
  # https://github.com/Oefenweb/ansible-ufw/blob/master/handlers/main.yml
  handlers:
    - name: Reload UFW
      ufw:
        state: reloaded
  tasks:
    # UFW Configuration - Using reusable playbook
    # See ufw-allowlist.yml for implementation details
    #
    # modify ufw setup
    # https://github.com/Oefenweb/ansible-ufw/issues/21
    #
    - name: "Update ufw before.rules until #21 is resolved"
      template:
        src: "{{ playbook_dir }}/templates/before.rules.j2"
        dest: /etc/ufw/before.rules
        owner: root
        mode: "0644"
      notify: Reload UFW
    - name: "Update ufw before6.rules for IPv6 ICMPv6/NDP/PMTUD"
      template:
        src: "{{ playbook_dir }}/templates/before6.rules.j2"
        dest: /etc/ufw/before6.rules
        owner: root
        mode: "0644"
      notify: Reload UFW

    #
    # SQLite WAL Kernel Tuning (128 GB servers)
    #
    # Optimized for:
    #   - High-concurrency WAL readers/writers
    #   - Large mmap regions (PRAGMA mmap_size)
    #   - Minimal swap pressure to avoid I/O stalls
    #   - Tuned dirty-page writeback for WAL checkpointing
    #

    - name: Gather memory facts for dynamic tuning
      ansible.builtin.setup:
        filter: ansible_memtotal_mb

    - name: Compute tuning values from total memory
      ansible.builtin.set_fact:
        # 5% of RAM as dirty_bytes ceiling (~6.4 GB on 128 GB)
        dirty_bytes: "{{ (ansible_memtotal_mb * 1024 * 1024 * 0.05) | int }}"
        # 2% of RAM as dirty_background_bytes (~2.5 GB on 128 GB)
        dirty_background_bytes: "{{ (ansible_memtotal_mb * 1024 * 1024 * 0.02) | int }}"
        # Reserve 256 MB for emergency allocations
        min_free_kbytes: "262144"
        # max_map_count: enough for many mmap'd databases (256 MB each)
        max_map_count: "1048576"

    - name: Configure SQLite WAL kernel parameters (overrides generic high-traffic defaults)
      ansible.builtin.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-sqlite-wal.conf
      loop:
        #
        # --- Virtual Memory (SQLite-specific overrides) ---
        #
        # These intentionally override the generic values from sysctl-high-traffic.yml
        # because SQLite WAL mode has different writeback requirements.
        #

        # Disable swap entirely; SQLite WAL servers must not swap
        # (overrides high-traffic swappiness=1)
        - { name: 'vm.swappiness', value: '0' }

        # Use absolute dirty bytes instead of ratios for predictable writeback.
        # This prevents bursty WAL checkpoints from stalling all writers.
        # (overrides high-traffic dirty_ratio=20 / dirty_background_ratio=10)
        - { name: 'vm.dirty_bytes', value: '{{ dirty_bytes }}' }
        - { name: 'vm.dirty_background_bytes', value: '{{ dirty_background_bytes }}' }
        - { name: 'vm.dirty_ratio', value: '0' }
        - { name: 'vm.dirty_background_ratio', value: '0' }

        # Shorten writeback expiry to 3s (high-traffic uses 30s).
        # Ensures WAL checkpoint writes are flushed promptly.
        - { name: 'vm.dirty_expire_centisecs', value: '300' }
        - { name: 'vm.dirty_writeback_centisecs', value: '100' }

        # Enough vm areas for many mmap'd SQLite databases (PRAGMA mmap_size)
        - { name: 'vm.max_map_count', value: '{{ max_map_count }}' }

        # Prefer keeping inode/dentry cache (SQLite opens many small files)
        - { name: 'vm.vfs_cache_pressure', value: '50' }

        # Reserve memory for critical allocations under pressure
        - { name: 'vm.min_free_kbytes', value: '{{ min_free_kbytes }}' }

        # Disable zone reclaim; NUMA nodes should share freely
        - { name: 'vm.zone_reclaim_mode', value: '0' }

        #
        # --- Filesystem (SQLite-specific additions) ---
        # Note: fs.file-max and fs.nr_open are already set by sysctl-high-traffic.yml
        #

        # Increase inotify limits for file monitoring (PM2, etc.)
        - { name: 'fs.inotify.max_user_watches', value: '524288' }
        - { name: 'fs.inotify.max_user_instances', value: '1024' }

    - name: Display computed tuning values
      ansible.builtin.debug:
        msg: |
          SQLite WAL sysctl tuning applied:
            Total RAM: {{ ansible_memtotal_mb }} MB
            dirty_bytes: {{ dirty_bytes }} (5% of RAM)
            dirty_background_bytes: {{ dirty_background_bytes }} (2% of RAM)
            max_map_count: {{ max_map_count }}
            min_free_kbytes: {{ min_free_kbytes }}
