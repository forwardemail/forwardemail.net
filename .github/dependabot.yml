version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "forwardemail/core"
    labels:
      - "dependencies"
    # Group minor/patch updates to reduce PR noise
    groups:
      production-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Security updates are always created regardless of schedule

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "forwardemail/core"
    labels:
      - "ci"
      - "dependencies"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/self-hosting"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "forwardemail/core"
    labels:
      - "docker"
      - "dependencies"
