---
name: Release convert-sqlite-to-eml Binaries

on:
  release:
    types: [published]

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: convert-sqlite-to-eml-linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            artifact: convert-sqlite-to-eml-linux-arm64
          - os: macos-14
            target: darwin-arm64
            artifact: convert-sqlite-to-eml-darwin-arm64
          - os: windows-latest
            target: win-x64
            artifact: convert-sqlite-to-eml-win-x64

    defaults:
      run:
        working-directory: tools/convert-sqlite-to-eml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build SEA binary
        run: npm run build

      - name: Rename binary for release (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/convert-sqlite-to-eml dist/${{ matrix.artifact }}

      - name: Rename binary for release (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item dist/convert-sqlite-to-eml.exe dist/${{ matrix.artifact }}.exe
        shell: pwsh

      - name: Test SEA binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "Testing SEA binary..."
          ./dist/${{ matrix.artifact }} --help
        shell: bash

      - name: Test SEA binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Host "Testing SEA binary..."
          & ".\dist\${{ matrix.artifact }}.exe" --help
        shell: pwsh

      - name: Upload binary to release (Linux/macOS)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v1
        with:
          files: tools/convert-sqlite-to-eml/dist/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary to release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v1
        with:
          files: tools/convert-sqlite-to-eml/dist/${{ matrix.artifact }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
